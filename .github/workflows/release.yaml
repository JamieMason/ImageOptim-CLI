name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write # Required for OIDC

jobs:
  build-matrix:
    uses: ./.github/workflows/_build-matrix.yaml

  publish-npm-binaries:
    name: Publish npm binaries
    needs: build-matrix
    runs-on: ${{ matrix.build.OS }}
    strategy:
      fail-fast: true
      matrix:
        build: ${{ fromJson(needs.build-matrix.outputs.build_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: 1.35.0
      - name: Set up Rust
        shell: bash
        run: |
          rustup show
          rustup target add ${{ matrix.build.TARGET }}
      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.build.TARGET }}
      - name: Publish rust binary package to npm
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_FLAGS: --provenance --tag alpha
        run: |
          just --dotenv-filename .env.${{ matrix.build.NAME }} build-binary-package
          just --dotenv-filename .env.${{ matrix.build.NAME }} publish-npm-binary-package
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: imageoptim-${{ matrix.build.TARGET }}
          path: target/${{ matrix.build.TARGET }}/release/imageoptim

  publish-npm-base:
    name: Publish npm package
    needs: publish-npm-binaries
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: 1.35.0
      - name: Publish the package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_FLAGS: --provenance --tag alpha
        run: |
          just --dotenv-filename .env.darwin-arm64 create-npm-root-package
          just --dotenv-filename .env.darwin-arm64 publish-npm-root-package
